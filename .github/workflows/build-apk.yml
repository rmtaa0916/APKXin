name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-24.04

    env:
      ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
      ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
      BUILDOZER_WARN_ON_ROOT: 0
      APP_ANDROID_API: 36
      APP_ANDROID_NDK: 29

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Buildozer and Gradle directories
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip python3-virtualenv \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev \
            automake autopoint gettext wget curl

      - name: Install Rust
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Upgrade pip and install Buildozer tooling
        run: |
          python -m pip install --upgrade pip wheel
          pip install git+https://github.com/kivy/buildozer
          pip install legacy-cgi setuptools cython==0.29.34

      - name: Prepare Android SDK command-line tools
        run: |
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          cd /tmp
          rm -rf cmdline-tools-temp commandlinetools.zip
          wget -O commandlinetools.zip https://dl.google.com/android/repository/commandlinetools-linux-14742923_latest.zip
          unzip -q commandlinetools.zip -d cmdline-tools-temp
          rm -rf "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          mv cmdline-tools-temp/cmdline-tools/* "$ANDROID_SDK_ROOT/cmdline-tools/latest/"
          mkdir -p "$ANDROID_SDK_ROOT/tools/bin"
          ln -sf "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "$ANDROID_SDK_ROOT/tools/bin/sdkmanager"
          ln -sf "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/avdmanager" "$ANDROID_SDK_ROOT/tools/bin/avdmanager"

      - name: Accept Android SDK licenses
        run: |
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Install Android SDK packages
        run: |
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;29.0.13113456"

      - name: Show tool versions
        run: |
          python --version
          java -version
          pip show buildozer || true
          buildozer --version

      - name: Clean previous local build state
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer/android/platform/build-*
          rm -rf ~/.gradle/caches/transforms-*

      - name: Build APK
        run: |
          buildozer android debug

      - name: List build outputs
        if: always()
        run: |
          ls -lah bin || true
          find . -maxdepth 3 \( -name '*.apk' -o -name '*.aab' \) -print || true

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MediMapPro-APK
          path: |
            bin/*.apk
            bin/*.aab
          if-no-files-found: warn
