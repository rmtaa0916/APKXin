name: Build and Android Emulator Smoke Test

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache Buildozer and pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle/caches
            ~/.cache/pip
          key: ${{ runner.os }}-buildozer-smoke-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-smoke-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev \
            build-essential ccache liblzma-dev libsqlite3-dev sqlite3 \
            bzip2 libbz2-dev libgdbm-dev libnss3-dev libreadline-dev \
            libedit-dev libbluetooth-dev libglu1-mesa-dev libgles2-mesa-dev \
            libgl1-mesa-dev libpulse-dev ffmpeg gettext autopoint \
            openjdk-17-jdk python3-pip

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip setuptools wheel Cython==0.29.33 buildozer

      - name: Set up Android SDK cmdline-tools
        env:
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
        run: |
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d cmdline-tools-temp
          rm -rf "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          mv cmdline-tools-temp/cmdline-tools "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      - name: Accept Android SDK licenses
        env:
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
        run: yes | sdkmanager --licenses >/dev/null || true

      - name: Install Android SDK packages
        env:
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"

      - name: Patch spec for x86_64 emulator build
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path("buildozer.spec")
          text = p.read_text(encoding="utf-8")
          replacements = {
              "android.archs = arm64-v8a": "android.archs = x86_64",
              "requirements = python3==3.10.11,hostpython3==3.10.11,kivy,kivymd,opencv,pandas,numpy,openpyxl,pypdf,typing_extensions,reportlab,pillow":
                  "requirements = python3==3.10.11,hostpython3==3.10.11,kivy,kivymd,opencv,pandas,numpy,openpyxl,pypdf,typing_extensions,reportlab,pillow",
          }
          for old, new in replacements.items():
              text = text.replace(old, new)
          if "android.archs =" not in text:
              text += "\nandroid.archs = x86_64\n"
          p.write_text(text, encoding="utf-8")
          PY
          grep -n "android.archs\|android.api\|android.minapi\|android.ndk" buildozer.spec

      - name: Build x86_64 debug APK
        run: buildozer -v android debug

      - name: Locate APK
        id: apk
        run: |
          APK_PATH="$(find bin -maxdepth 1 -type f -name '*debug*.apk' | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "No APK found in bin/"
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "APK_PATH=$APK_PATH" >> "$GITHUB_ENV"
          echo "Found APK: $APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-x86_64-debug
          path: ${{ steps.apk.outputs.apk_path }}

  emulator-smoke:
    needs: build-apk
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: apk-x86_64-debug
          path: smoke-artifacts

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Boot emulator and run smoke test
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          target: default
          profile: pixel_7_pro
          emulator-boot-timeout: 900
          disable-animations: true
          script: |
            set -euxo pipefail
            APK_PATH="$(find smoke-artifacts -type f -name '*.apk' | head -n 1)"
            if [ -z "$APK_PATH" ]; then
              echo "APK not found"
              exit 1
            fi

            adb devices
            adb install -r "$APK_PATH"

            PACKAGE_NAME="org.medimap.medimappro"
            LAUNCHER_ACTIVITY="$(adb shell cmd package resolve-activity --brief $PACKAGE_NAME | tail -n 1 | tr -d '\r')"
            if [ -z "$LAUNCHER_ACTIVITY" ]; then
              echo "Could not resolve launcher activity"
              exit 1
            fi

            adb shell am start -n "$LAUNCHER_ACTIVITY"
            sleep 20

            adb shell pidof "$PACKAGE_NAME" >/tmp/pid.txt || true
            if ! [ -s /tmp/pid.txt ]; then
              echo "App is not running after launch"
              adb logcat -d > smoke-artifacts/logcat.txt || true
              adb exec-out screencap -p > smoke-artifacts/screenshot.png || true
              exit 1
            fi

            adb logcat -d > smoke-artifacts/logcat.txt || true
            adb exec-out screencap -p > smoke-artifacts/screenshot.png || true

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-smoke-artifacts
          path: smoke-artifacts
