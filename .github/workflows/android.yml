name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare Buildozer SDK path and install stable Android tools
        run: |
          export BUILD_SDK="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$BUILD_SDK"

          SDKMANAGER="/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager"

          yes | "$SDKMANAGER" --sdk_root="$BUILD_SDK" --licenses
          "$SDKMANAGER" --sdk_root="$BUILD_SDK" --channel=0 --install \
            "platform-tools" \
            "platforms;android-31" \
            "build-tools;36.0.0"

          find "$BUILD_SDK/build-tools" -maxdepth 2 -type f | head -50 || true

      - name: Build with Buildozer
        uses: digreatbrian/buildozer-action@v2
        with:
          python-version: "3.11"
          workdir: android_kivy_app
          buildozer-cmd: buildozer -v android debug

      - name: Show APK files
        run: ls -R android_kivy_app/bin || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: medimap-pro-apk
          path: android_kivy_app/bin/*.apk
          if-no-files-found: error
