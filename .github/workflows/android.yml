name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install buildozer Cython==0.29.33

      - name: Prepare Android SDK for Buildozer
        run: |
          BUILD_SDK="$HOME/.buildozer/android/platform/android-sdk"
          RUNNER_SDK="/usr/local/lib/android/sdk"
          SDKMANAGER="$RUNNER_SDK/cmdline-tools/latest/bin/sdkmanager"

          mkdir -p "$BUILD_SDK"
          rm -rf "$BUILD_SDK/tools"
          ln -s "$RUNNER_SDK/cmdline-tools/latest" "$BUILD_SDK/tools"

          yes | "$SDKMANAGER" --sdk_root="$BUILD_SDK" --licenses

          "$SDKMANAGER" --sdk_root="$BUILD_SDK" --channel=0 --install \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Build APK
        run: |
          export ANDROIDSDK="$HOME/.buildozer/android/platform/android-sdk"
          export ANDROID_HOME="$HOME/.buildozer/android/platform/android-sdk"
          export ANDROID_SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          export ANDROIDAPI="34"
          export ANDROIDMINAPI="21"

          echo "ANDROIDAPI=$ANDROIDAPI"
          echo "ANDROIDMINAPI=$ANDROIDMINAPI"

          buildozer -v android debug

      - name: Show APK files
        run: ls -R bin || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: medimap-pro-apk
          path: bin/*.apk
          if-no-files-found: error
